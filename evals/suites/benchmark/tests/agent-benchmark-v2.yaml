- description: 'Format: make specific text bold'
  vars:
    fixture: nda.docx
    keepFile: true
    task: 'Make all occurrences of "TechCraft LLC" bold throughout the document. Do not change any text content.'
    fidelityChecks: '[{"type":"formatting","text":"TechCraft","property":"bold"}]'
  assert:
    - type: javascript
      metric: correctness
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('TechCraft')) return { pass: false, score: 0, reason: 'TechCraft not found' };
        return { pass: true, score: 1, reason: 'Text preserved' };
    - type: javascript
      metric: collateral
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('Amazing')) return { pass: false, score: 0, reason: 'Collateral: Amazing removed' };
        if (!t.includes('indemnify')) return { pass: false, score: 0, reason: 'Collateral: indemnification removed' };
        return { pass: true, score: 1, reason: 'Content preserved' };
    - type: javascript
