- description: 'Format: replace text preserving bold'
  vars:
    fixture: nda.docx
    keepFile: true
    task: 'Replace all occurrences of "Amazing Corp" with "Apex Holdings" throughout the document. The replacement text must keep the same formatting (bold, italic, etc.) as the original.'
    fidelityChecks: '[]'
  assert:
    - type: javascript
      metric: correctness
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('Apex Holdings')) return { pass: false, score: 0, reason: 'Apex Holdings not found' };
        if (t.includes('Amazing Corp')) return { pass: false, score: 0, reason: 'Amazing Corp still present' };
        return { pass: true, score: 1, reason: 'Replaced correctly' };
    - type: javascript
      metric: collateral
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('TechCraft')) return { pass: false, score: 0, reason: 'Collateral: TechCraft removed' };
        if (d.documentChanged !== true) return { pass: false, score: 0, reason: 'documentChanged should be true' };
        return { pass: true, score: 1, reason: 'TechCraft intact' };
    - type: javascript
      metric: fidelity
      value: file://../shared/checks.cjs:benchmarkFidelity
    - type: javascript
      metric: diff
      weight: 0
      value: file://../shared/checks.cjs:benchmarkDiff
    - type: javascript
