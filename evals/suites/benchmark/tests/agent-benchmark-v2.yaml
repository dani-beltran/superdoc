- description: 'Complex: tracked change replacement'
  vars:
    fixture: nda.docx
    keepFile: true
    task: 'Using tracked changes (suggesting mode), replace "$500,000" with "$750,000" in the document. The change should appear as a tracked/suggested change, not a direct edit.'
    fidelityChecks: '[{"type":"trackedChangeCount","min":1}]'
  assert:
    - type: javascript
      metric: correctness
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('750,000') && !t.includes('750000')) return { pass: false, score: 0, reason: '750,000 not found' };
        return { pass: true, score: 1, reason: 'Amount updated' };
    - type: javascript
      metric: collateral
      value: |
        const d = JSON.parse(output);
        const t = d.documentText || '';
        if (!t.includes('TechCraft')) return { pass: false, score: 0, reason: 'Collateral: TechCraft removed' };
        return { pass: true, score: 1, reason: 'Content preserved' };
    - type: javascript
      metric: fidelity
      value: file://../shared/checks.cjs:benchmarkFidelity
    - type: javascript
      metric: diff
      weight: 0
      value: file://../shared/checks.cjs:benchmarkDiff
    - type: javascript
      metric: steps
      weight: 0
      value: file://../shared/checks.cjs:benchmarkSteps
    - type: javascript
